<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إضافة مكان جديد</title>

  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/add.css" />
</head>
<body>

<header>
  <nav class="navbar admin-navbar-simple">
    <div class="logo">لوحة المشرف</div>

    <div class="admin-navbar-actions">
      <button id="nightModeBtn" class="night-btn">🌙 الوضع الليلي</button>
      <a href="dashboard.html" class="btn-logout admin-logout-link">العودة للوحة التحكم</a>
    </div>
  </nav>
</header>

<main class="add-container">
  <h1>إضافة مكان جديد</h1>

  <form id="addForm" class="add-form" novalidate>

    <div class="form-group">
      <label>اسم المكان *</label>
      <input type="text" id="placeName" />
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>الصورة الرئيسية *</label>
      <input type="file" id="mainImage" accept="image/*" />
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>الوصف *</label>
      <textarea id="placeDescription" rows="5"></textarea>
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>التصنيف *</label>
      <select id="placeType">
        <option value="">اختر التصنيف</option>
        <option>غربية</option>
        <option>شرقية</option>
        <option>وسطى</option>
        <option>جنوبية</option>
        <option>شمالية</option>
      </select>
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>المميزات *</label>
      <input type="text" id="placeFeatures" />
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>الأنشطة *</label>
      <input type="text" id="placeActivities" />
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>أفضل المعالم زيارة *</label>
      <textarea id="bestLandmarks" rows="4"></textarea>
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>صورة المعرض الأولى *</label>
      <input type="file" id="gallery1" accept="image/*" />
      <small class="error-message"></small>
    </div>

    <div class="form-group">
      <label>صورة المعرض الثانية</label>
      <input type="file" id="gallery2" accept="image/*" />
    </div>

    <div class="form-group">
      <label>صورة المعرض الثالثة</label>
      <input type="file" id="gallery3" accept="image/*" />
    </div>

    <button type="submit" class="btn-save-update">إضافة المكان</button>
  </form>
</main>

<footer>
  <p>© اكتشف السعودية — جامعة الملك سعود</p>
</footer>

<script src="../JS/main.js"></script>
<script src="../JS/add.js"></script>
</body>
</html>

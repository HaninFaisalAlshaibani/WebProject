<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول المشرف</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body class="login-page">

  <header>
    <nav class="navbar admin-navbar-simple">
      <div class="logo">لوحة المشرف</div>

      <div class="admin-navbar-actions">
        <a href="../project/index.html" class="btn-back-dashboard">زيارة الموقع</a>
      </div>
    </nav>
  </header>

  <main class="login-shell">
    <form id="loginForm" class="login-card" novalidate>
      <h1>تسجيل دخول المشرف</h1>

      <div id="loginErrorMessage" class="login-error-message"></div>

      <div class="form-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" placeholder="مثال : admin">
        <small class="error-message"></small>
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="أدخل كلمة المرور">
        <small class="error-message"></small>
      </div>

      <button type="submit" class="btn-login">دخول</button>
    </form>
  </main>

  <footer>
    <p>© اكتشف السعودية — جامعة الملك سعود</p>
  </footer>

  <script src="../JS/main.js"></script>
  <script src="../JS/login.js"></script>
</body>
</html>
